<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShotTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --surface2:  #1a1a1a;
    --border:    #252525;
    --accent:    #e8ff47;
    --accent2:   #ff6b35;
    --text:      #f0f0f0;
    --muted:     #666;
    --danger:    #ff4444;
    --success:   #44ff88;
    --radius:    8px;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --display:   'Bebas Neue', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,.012) 2px,
      rgba(255,255,255,.012) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── SCREENS ── */
  .screen { display: none; animation: fadeUp .3s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── NAV BAR ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: var(--display);
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
  }
  .nav-breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }
  .nav-breadcrumb span { color: var(--text); }
  .nav-breadcrumb .sep { color: var(--border); }
  .nav-actions { display: flex; gap: 8px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius);
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    border: none; cursor: pointer; transition: all .15s;
    text-decoration: none; white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent); color: #000;
  }
  .btn-primary:hover { background: #d4e83e; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,255,71,.25); }
  .btn-ghost {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: #444; }
  .btn-danger {
    background: transparent; color: var(--danger); border: 1px solid #330000;
  }
  .btn-danger:hover { background: #1a0000; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-icon {
    width: 32px; height: 32px; padding: 0; justify-content: center;
    border-radius: 6px; font-size: 16px;
  }

  /* ── CONTAINER ── */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .page-title {
    font-family: var(--display);
    font-size: 48px; letter-spacing: 3px;
    line-height: 1;
  }
  .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

  /* ── CARDS ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all .2s;
    position: relative; overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .2s;
  }
  .project-card:hover { border-color: #333; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .project-card:hover::before { transform: scaleX(1); }

  .project-card-name {
    font-size: 16px; font-weight: 600; margin-bottom: 8px;
  }
  .project-card-meta {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .project-card-actions {
    display: flex; gap: 6px; margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 80px 24px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
  .empty-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 13px; margin-bottom: 24px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%; max-width: 480px;
    padding: 28px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity:0 }
    to   { transform: translateY(0);    opacity:1 }
  }
  .modal-title {
    font-family: var(--display);
    font-size: 28px; letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }

  /* ── FORMS ── */
  .form-group { margin-bottom: 18px; }
  label {
    display: block; font-family: var(--mono); font-size: 11px;
    color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .08em;
  }
  input, select, textarea {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--sans); font-size: 14px;
    padding: 10px 12px; outline: none; transition: border-color .15s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--surface); }

  /* ── PROJECT SCREEN TABS ── */
  .tabs {
    display: flex; gap: 0; margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 20px; cursor: pointer;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all .15s; text-transform: uppercase; letter-spacing: .1em;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CATEGORY PILLS ── */
  .category-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .category-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 12px;
    font-size: 12px; font-family: var(--mono);
    cursor: default;
  }
  .category-pill .del {
    cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1;
    transition: color .15s;
  }
  .category-pill .del:hover { color: var(--danger); }

  /* ── SHOT CARDS ── */
  .shot-list { display: flex; flex-direction: column; gap: 10px; }

  .shot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 16px; align-items: start;
    transition: border-color .15s;
  }
  .shot-card:hover { border-color: #333; }
  .shot-card.completed { opacity: .5; }
  .shot-card.completed .shot-desc { text-decoration: line-through; color: var(--muted); }

  .shot-number {
    font-family: var(--display);
    font-size: 28px; color: var(--accent); line-height: 1;
  }
  .shot-body { min-width: 0; }
  .shot-desc { font-size: 14px; margin-bottom: 8px; }
  .shot-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .tag.type  { border-color: #2a3a00; color: #aed136; }
  .tag.scene { border-color: #002a3a; color: #36c5ed; }
  .tag.loc   { border-color: #2a1a00; color: #e8a136; }
  .tag.prio-high   { border-color: #3a0000; color: #ff6060; }
  .tag.prio-medium { border-color: #2a2000; color: #e8c436; }
  .tag.prio-low    { border-color: #002a10; color: #44d483; }

  .shot-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex; gap: 16px; margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 100px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
  }
  .stat-value { font-family: var(--display); font-size: 36px; color: var(--accent); line-height: 1; }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    height: 3px; background: var(--border); border-radius: 2px;
    margin-bottom: 28px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width .5s ease;
  }

  /* ── SEARCH ── */
  .search-row {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
  }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { padding-left: 36px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 100px;
    font-family: var(--mono); font-size: 12px;
    transition: transform .3s ease;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── LOADING ── */
  .loader {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; color: var(--muted); font-family: var(--mono); font-size: 12px;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CHECKBOX ── */
  .check-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .check-wrap input[type=checkbox] {
    width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
  }

  /* ── DRAG HANDLE ── */
  .drag-handle {
    cursor: grab; color: var(--border); font-size: 16px;
    padding: 4px; transition: color .15s;
  }
  .drag-handle:hover { color: var(--muted); }
  .shot-card[draggable=true].dragging { opacity: .4; }

  /* ── FILTER CHIPS ── */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-chip {
    font-family: var(--mono); font-size: 11px;
    padding: 4px 12px; border-radius: 100px;
    border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; transition: all .15s;
  }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,.06); }
  .filter-chip:hover { color: var(--text); }
</style>
</head>

<script>
// ════════════════════════════════════════════
//   SUPABASE MINI-CLIENT

const sb = {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  },
  url(table, params='') {
    return `${SUPABASE_URL}/rest/v1/${table}${params}`;
  },
  async get(table, params='') {
    const r = await fetch(this.url(table, params), { headers: this.headers });
    if (!r.ok) throw await r.json();
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(this.url(table), {
      method: 'POST', headers: this.headers,
      body: JSON.stringify(body)
    });
    if (!r.ok) throw await r.json();
    return r.json();
  },
  async patch(table, id, body) {
    const r = await fetch(this.url(table, `?id=eq.${id}`), {
      method: 'PATCH', headers: this.headers,
      body: JSON.stringify(body)
    });
    if (!r.ok) throw await r.json();
    return r.json();
  },
  async delete(table, id) {
    const r = await fetch(this.url(table, `?id=eq.${id}`), {
      method: 'DELETE', headers: this.headers
    });
    if (!r.ok) throw await r.json();
    return true;
  }
};

  categories: {},   // { scenes:[], locations:[], costumes:[], characters:[] }
  activeTab:  'shots',
  editingShot: null,
  shotFilter: null,
};

// ════════════════════════════════════════════
//   NAVIGATION
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goHome() {
  state.currentProject = null;
  updateNav('home');
  showScreen('home');
  loadProjects();
}

function updateNav(context) {
  const bc = document.getElementById('breadcrumb');
  const na = document.getElementById('nav-actions');
  if (context === 'home') {
    bc.innerHTML = '';
    na.innerHTML = '';
  } else if (context === 'project') {
    bc.innerHTML = `
      <span style="cursor:pointer;color:var(--muted)" onclick="goHome()">Projects</span>
      <span class="sep">›</span>
      <span>${state.currentProject.name}</span>
    `;
    na.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="confirmDelete('project', '${state.currentProject.id}')">Delete Project</button>
    `;
  }
}

// ════════════════════════════════════════════
//   MODAL HELPERS
// ════════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) o.classList.remove('open');
  });
});

// ════════════════════════════════════════════
//   TOAST
// ════════════════════════════════════════════
let toastTimer;
function toast(msg, color='var(--accent)') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ════════════════════════════════════════════
//   CONFIRM DELETE
// ════════════════════════════════════════════
function confirmDelete(type, id, extra) {
  openModal('modal-confirm');
  document.getElementById('confirm-ok-btn').onclick = () => {
    closeModal('modal-confirm');
    if (type === 'project') deleteProject(id);
    else if (type === 'shot') deleteShot(id);
    else if (type === 'category') deleteCat(id);
  };
}

// ════════════════════════════════════════════
//   PROJECTS
// ════════════════════════════════════════════
async function loadProjects() {
  const grid = document.getElementById('project-grid');
  const loader = document.getElementById('projects-loader');
  grid.innerHTML = '';
  loader.style.display = 'flex';

  try {
    state.projects = await sb.get('projects', '?order=created_at.desc');
  } catch(e) {
    loader.innerHTML = `<span style="color:var(--danger)">⚠ ${e.message || 'Connection error — check Supabase config'}</span>`;
    return;
  }
  loader.style.display = 'none';

  if (!state.projects.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🎬</div>
        <div class="empty-title">No projects yet</div>
        <div class="empty-sub">Start by creating your first film project</div>
        <button class="btn btn-primary" onclick="openModal('modal-new-project')">+ NEW PROJECT</button>
      </div>`;
    return;
  }

  state.projects.forEach(p => {
    const d = new Date(p.created_at).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    const card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML = `
      <div class="project-card-name">${esc(p.name)}</div>
      <div class="project-card-meta">Created ${d}</div>
      <div class="project-card-actions">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openProject('${p.id}')">Open →</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete('project','${p.id}')">✕</button>
      </div>`;
    grid.appendChild(card);
  });
}

async function createProject() {
  const name = document.getElementById('inp-project-name').value.trim();
  if (!name) return toast('Enter a project name', 'var(--danger)');
  try {
    const [proj] = await sb.post('projects', { name });
    closeModal('modal-new-project');
    document.getElementById('inp-project-name').value = '';
    toast('✓ Project created');
    await loadProjects();
  } catch(e) {
    toast('Error: ' + (e.message || 'unknown'), 'var(--danger)');
  }
}

async function deleteProject(id) {
  try {
    // cascade-delete shots + categories
    const shots = await sb.get('shots', `?project_id=eq.${id}`);
    for (const s of shots) await sb.delete('shots', s.id);
    const cats = await sb.get('categories', `?project_id=eq.${id}`);
    for (const c of cats) await sb.delete('categories', c.id);
    await sb.delete('projects', id);
    toast('Project deleted');
    goHome();
  } catch(e) {
    toast('Delete failed', 'var(--danger)');
  }
}

// ════════════════════════════════════════════
//   OPEN PROJECT
// ════════════════════════════════════════════
async function openProject(id) {
  state.currentProject = state.projects.find(p => p.id === id);
  updateNav('project');
  showScreen('project');

  document.getElementById('proj-title').textContent = state.currentProject.name.toUpperCase();
  document.getElementById('proj-subtitle').textContent = `// project id: ${id.slice(0,8)}`;

  switchTab('shots');
  await Promise.all([loadShots(), loadAllCategories()]);
}

// ════════════════════════════════════════════
//   TABS
// ════════════════════════════════════════════
const CAT_TYPES = ['scenes', 'locations', 'costumes', 'characters'];

function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    const names = ['shots', ...CAT_TYPES];
    el.classList.toggle('active', names[i] === tab);
  });

  document.getElementById('tab-shots').style.display    = tab === 'shots' ? 'block' : 'none';
  document.getElementById('tab-category').style.display = tab !== 'shots' ? 'block' : 'none';

  if (tab !== 'shots') renderCategory(tab);
}

// ════════════════════════════════════════════
//   SHOTS
// ════════════════════════════════════════════
async function loadShots() {
  const pid = state.currentProject.id;
  state.shots = await sb.get('shots', `?project_id=eq.${pid}&order=story_order.asc,created_at.asc`);
  renderShots();
  updateStats();
}

function renderShots() {
  const q = (document.getElementById('shot-search')?.value || '').toLowerCase();
  const f = state.shotFilter;

  let shots = state.shots.filter(s => {
    if (q && !JSON.stringify(s).toLowerCase().includes(q)) return false;
    if (f === 'completed'   && !s.completed) return false;
    if (f === 'incomplete'  &&  s.completed) return false;
    if (f === 'high'        && s.priority?.toLowerCase() !== 'high') return false;
    return true;
  });

  const list = document.getElementById('shot-list');
  list.innerHTML = '';

  if (!shots.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎥</div>
        <div class="empty-title">No shots yet</div>
        <div class="empty-sub">Add your first shot to get started</div>
      </div>`;
    return;
  }

  // Rebuild filter chips
  const filterRow = document.getElementById('shot-filters');
  const chips = [
    { label: 'All',        val: null        },
    { label: '✓ Done',     val: 'completed' },
    { label: '● Remaining',val: 'incomplete'},
    { label: '▲ High Priority', val: 'high' },
  ];
  filterRow.innerHTML = chips.map(c => `
    <span class="filter-chip ${state.shotFilter === c.val ? 'active':''}"
      onclick="setFilter(${c.val === null ? 'null' : `'${c.val}'`})">${c.label}</span>
  `).join('');

  shots.forEach((shot, i) => {
    const card = document.createElement('div');
    card.className = 'shot-card' + (shot.completed ? ' completed' : '');
    card.draggable = true;
    card.dataset.id = shot.id;

    const tags = [
      shot.shot_type  ? `<span class="tag type">${esc(shot.shot_type)}</span>` : '',
      shot.movement   ? `<span class="tag">${esc(shot.movement)}</span>` : '',
      shot.scene      ? `<span class="tag scene">S: ${esc(shot.scene)}</span>` : '',
      shot.location   ? `<span class="tag loc">📍 ${esc(shot.location)}</span>` : '',
      shot.clothes    ? `<span class="tag">👔 ${esc(shot.clothes)}</span>` : '',
      shot.priority   ? `<span class="tag prio-${(shot.priority||'').toLowerCase()}">${esc(shot.priority)}</span>` : '',
    ].filter(Boolean).join('');

    card.innerHTML = `
      <div class="shot-number">${shot.shot_no || (i + 1)}</div>
      <div class="shot-body">
        <div class="shot-desc">${esc(shot.description || '—')}</div>
        <div class="shot-tags">${tags}</div>
      </div>
      <div class="shot-actions">
        <button class="btn btn-icon btn-ghost" title="${shot.completed ? 'Mark incomplete' : 'Mark complete'}"
          onclick="toggleComplete('${shot.id}', ${shot.completed})">${shot.completed ? '↩' : '✓'}</button>
        <button class="btn btn-icon btn-ghost" title="Edit" onclick="editShot('${shot.id}')">✏</button>
        <button class="btn btn-icon btn-danger" title="Delete" onclick="confirmDelete('shot','${shot.id}')">✕</button>
      </div>`;

    // Drag
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragover',  onDragOver);
    card.addEventListener('drop',      onDrop);
    card.addEventListener('dragend',   onDragEnd);

    list.appendChild(card);
  });
}

function setFilter(val) {
  state.shotFilter = val;
  renderShots();
}

function updateStats() {
  const total     = state.shots.length;
  const done      = state.shots.filter(s => s.completed).length;
  const pct       = total ? Math.round(done / total * 100) : 0;
  const high      = state.shots.filter(s => s.priority === 'High').length;

  document.getElementById('proj-stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Shots</div></div>
    <div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value">${total - done}</div><div class="stat-label">Remaining</div></div>
    <div class="stat-card"><div class="stat-value">${pct}%</div><div class="stat-label">Progress</div></div>
    <div class="stat-card"><div class="stat-value">${high}</div><div class="stat-label">High Priority</div></div>
  `;
  document.getElementById('proj-progress').style.width = pct + '%';
}

async function saveShot() {
  const pid = state.currentProject.id;
  const body = {
    project_id:  pid,
    shot_type:   document.getElementById('inp-shot-type').value,
    movement:    document.getElementById('inp-movement').value,
    scene:       document.getElementById('inp-scene').value,
    location:    document.getElementById('inp-location').value,
    clothes:     document.getElementById('inp-costume').value,
    priority:    document.getElementById('inp-priority').value,
    description: document.getElementById('inp-description').value.trim(),
    completed:   document.getElementById('inp-completed').checked,
  };

  try {
    if (state.editingShot) {
      await sb.patch('shots', state.editingShot, body);
      toast('✓ Shot updated');
    } else {
      body.shot_no = state.shots.length + 1;
      body.story_order = state.shots.length;
      await sb.post('shots', body);
      toast('✓ Shot added');
    }
    closeModal('modal-new-shot');
    state.editingShot = null;
    await loadShots();
  } catch(e) {
    toast('Save failed', 'var(--danger)');
    console.error(e);
  }
}

function editShot(id) {
  const shot = state.shots.find(s => s.id === id);
  if (!shot) return;
  state.editingShot = id;

  document.getElementById('shot-modal-title').textContent = 'EDIT SHOT';
  document.getElementById('inp-shot-type').value   = shot.shot_type  || '';
  document.getElementById('inp-movement').value    = shot.movement   || '';
  document.getElementById('inp-description').value = shot.description|| '';
  document.getElementById('inp-priority').value    = shot.priority   || '';
  document.getElementById('inp-completed').checked = !!shot.completed;

  // populate selects first, then set values
  populateShotSelects().then(() => {
    document.getElementById('inp-scene').value    = shot.scene    || '';
    document.getElementById('inp-location').value = shot.location || '';
    document.getElementById('inp-costume').value  = shot.clothes  || '';
    openModal('modal-new-shot');
  });
}

async function deleteShot(id) {
  try {
    await sb.delete('shots', id);
    state.shots = state.shots.filter(s => s.id !== id);
    renderShots();
    updateStats();
    toast('Shot deleted');
  } catch(e) {
    toast('Delete failed', 'var(--danger)');
  }
}

async function toggleComplete(id, current) {
  try {
    await sb.patch('shots', id, { completed: !current });
    const shot = state.shots.find(s => s.id === id);
    if (shot) shot.completed = !current;
    renderShots();
    updateStats();
    toast(current ? '↩ Marked incomplete' : '✓ Shot completed');
  } catch(e) {
    toast('Error', 'var(--danger)');
  }
}

// ════════════════════════════════════════════
//   DRAG & DROP (story order)
// ════════════════════════════════════════════
let dragSrcId = null;

function onDragStart(e) {
  dragSrcId = this.dataset.id;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
async function onDrop(e) {
  e.preventDefault();
  if (dragSrcId === this.dataset.id) return;
  const srcIdx = state.shots.findIndex(s => s.id === dragSrcId);
  const tgtIdx = state.shots.findIndex(s => s.id === this.dataset.id);
  const [item] = state.shots.splice(srcIdx, 1);
  state.shots.splice(tgtIdx, 0, item);
  renderShots();
  // Persist story_order
  for (let i = 0; i < state.shots.length; i++) {
    sb.patch('shots', state.shots[i].id, { story_order: i }).catch(()=>{});
  }
  toast('Story order saved');
}
function onDragEnd() {
  this.classList.remove('dragging');
}

// ════════════════════════════════════════════
//   CATEGORIES
// ════════════════════════════════════════════
async function loadAllCategories() {
  const pid = state.currentProject.id;
  const all = await sb.get('categories', `?project_id=eq.${pid}`);
  state.categories = { scenes:[], locations:[], costumes:[], characters:[] };
  all.forEach(c => {
    const key = c.type;
    if (state.categories[key]) state.categories[key].push(c);
  });
}

function renderCategory(type) {
  const items = state.categories[type] || [];
  const list  = document.getElementById('cat-list');
  const empty = document.getElementById('cat-empty');

  // label for input
  document.getElementById('cat-input').placeholder = `Add ${type.slice(0,-1)}…`;

  list.innerHTML = '';
  if (!items.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  items.forEach(c => {
    const pill = document.createElement('div');
    pill.className = 'category-pill';
    pill.innerHTML = `${esc(c.name)} <span class="del" onclick="confirmDelete('category','${c.id}')">×</span>`;
    list.appendChild(pill);
  });
}

async function addCategory() {
  const type = state.activeTab;
  const name = document.getElementById('cat-input').value.trim();
  if (!name) return;
  try {
    const [cat] = await sb.post('categories', {
      project_id: state.currentProject.id,
      type, name
    });
    if (!state.categories[type]) state.categories[type] = [];
    state.categories[type].push(cat);
    document.getElementById('cat-input').value = '';
    renderCategory(type);
    toast(`✓ Added to ${type}`);
  } catch(e) {
    toast('Error', 'var(--danger)');
  }
}

async function deleteCat(id) {
  try {
    await sb.delete('categories', id);
    for (const key of Object.keys(state.categories)) {
      state.categories[key] = state.categories[key].filter(c => c.id !== id);
    }
    renderCategory(state.activeTab);
    toast('Removed');
  } catch(e) {
    toast('Error', 'var(--danger)');
  }
}

// ════════════════════════════════════════════
//   POPULATE SHOT SELECTS FROM CATEGORIES
// ════════════════════════════════════════════
function openNewShotModal() {
  state.editingShot = null;
  document.getElementById('shot-modal-title').textContent = 'NEW SHOT';
  document.getElementById('inp-shot-type').value   = '';
  document.getElementById('inp-movement').value    = '';
  document.getElementById('inp-description').value = '';
  document.getElementById('inp-priority').value    = '';
  document.getElementById('inp-completed').checked = false;
  populateShotSelects().then(() => openModal('modal-new-shot'));
}

async function populateShotSelects() {
  const fill = (id, items) => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">— select —</option>';
    items.forEach(n => {
      const o = document.createElement('option');
      o.value = o.textContent = n;
      sel.appendChild(o);
    });
    sel.value = cur;
  };
  fill('inp-scene',    (state.categories.scenes    || []).map(c => c.name));
  fill('inp-location', (state.categories.locations || []).map(c => c.name));
  fill('inp-costume',  (state.categories.costumes  || []).map(c => c.name));
}

// Override the + SHOT button click
document.addEventListener('DOMContentLoaded', () => {
  // Re-wire the + SHOT button
  const addShotBtn = document.querySelector('[onclick="openModal(\'modal-new-shot\')"]');
  if (addShotBtn) {
    addShotBtn.removeAttribute('onclick');
    addShotBtn.addEventListener('click', openNewShotModal);
  }
});

// ════════════════════════════════════════════
//   UTILS
// ════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key support
document.getElementById('inp-project-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createProject();
});

// ════════════════════════════════════════════
//   BOOT
// ════════════════════════════════════════════
loadProjects();
</script>
</body>
</html>
